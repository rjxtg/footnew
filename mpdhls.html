<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Foot Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:sans-serif;color:#fff;user-select:none}
#wrap{position:relative;width:100%;height:100%;background:#000;cursor:pointer}
video{width:100%;height:100%;display:block;background:#000}
#loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:30;transition:opacity .3s}
#loader.hide{opacity:0;pointer-events:none}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:32px 14px 12px;opacity:0;transition:opacity .25s}
#wrap:hover #controls,#wrap.sc #controls{opacity:1}
#btn-row{display:flex;align-items:center;gap:6px}
.cb{background:none;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0}
.cb:hover{background:rgba(255,255,255,.15)}
.cb svg{width:22px;height:22px;fill:#fff;display:block}
#vol-wrap{display:flex;align-items:center;gap:4px}
#vs{-webkit-appearance:none;appearance:none;width:70px;height:3px;background:rgba(255,255,255,.35);border-radius:2px;outline:none;cursor:pointer}
#vs::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border-radius:50%}
.sp{flex:1}
#qw{position:relative}
#qbtn{font-size:11px;font-weight:700;padding:4px 8px;letter-spacing:.5px}
#qm{display:none;position:absolute;bottom:40px;right:0;background:rgba(20,20,20,.96);border-radius:8px;overflow:hidden;min-width:110px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#qm.open{display:block}
.qi{padding:9px 14px;cursor:pointer;font-size:13px;white-space:nowrap}
.qi:hover{background:rgba(255,255,255,.1)}
.qi.active{font-weight:700;background:rgba(255,255,255,.06)}
#err{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:24px;background:#000;z-index:40}
#err.show{display:flex}
#err p{font-size:13px;opacity:.6;max-width:300px;line-height:1.7}
#err code{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:3px;font-size:11px}
#url-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:35;background:rgba(20,20,20,.96);border-radius:12px;padding:24px;width:min(420px,90vw);display:flex;flex-direction:column;gap:12px}
#url-box h2{font-size:15px;font-weight:600;opacity:.9}
#url-box label{font-size:12px;opacity:.55}
#url-box input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;outline:none;width:100%}
#url-box input:focus{border-color:rgba(255,255,255,.5)}
#url-box input::placeholder{color:rgba(255,255,255,.35)}
#url-box button{background:#fff;color:#000;border:none;padding:10px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
#url-box button:hover{background:#e0e0e0}
#hint{font-size:11px;opacity:.35;text-align:center}
</style>
</head>
<body>
<div id="wrap">
  <div id="loader"><div class="spin"></div></div>
  <div id="err"><p id="etxt">Stream failed to load.</p></div>

  <div id="url-box">
    <h2>&#9654; Stream Player</h2>
    <label>Paste your stream URL (.mpd or .m3u8)</label>
    <input id="url-in" type="url" placeholder="https://example.com/stream.mpd" autocomplete="off" spellcheck="false"/>
    <button id="load-btn">Load Stream</button>
    <span id="hint">Supports DASH (.mpd) · HLS (.m3u8) · Widevine DRM via &amp;wv= param</span>
  </div>

  <video id="video" autoplay playsinline></video>

  <div id="controls">
    <div id="btn-row">
      <button class="cb" id="bp">
        <svg id="ip" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div id="vol-wrap">
        <button class="cb" id="bm">
          <svg id="iv" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
        <input id="vs" type="range" min="0" max="1" step="0.05" value="1">
      </div>
      <div class="sp"></div>
      <div id="qw">
        <button class="cb" id="qbtn">AUTO</button>
        <div id="qm"></div>
      </div>
      <button class="cb" id="bfs">
        <svg id="ifs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";
const video=document.getElementById("video"),
loader=document.getElementById("loader"),
errEl=document.getElementById("err"),
eTxt=document.getElementById("etxt"),
wrap=document.getElementById("wrap"),
bp=document.getElementById("bp"),
ip=document.getElementById("ip"),
bm=document.getElementById("bm"),
iv=document.getElementById("iv"),
vs=document.getElementById("vs"),
qBtn=document.getElementById("qbtn"),
qMenu=document.getElementById("qm"),
bfs=document.getElementById("bfs"),
ifs=document.getElementById("ifs"),
ub=document.getElementById("url-box"),
urlIn=document.getElementById("url-in"),
loadBtn=document.getElementById("load-btn");

const P={
  play:"M8 5v14l11-7z",
  pause:"M6 19h4V5H6v14zm8-14v14h4V5h-4z",
  vOn:"M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z",
  vOff:"M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19L19 20.27 20.27 19 5.27 4 4.27 3zM12 4L9.91 6.09 12 8.18V4z",
  fsOn:"M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z",
  fsOff:"M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"
};
const si=(el,k)=>el.innerHTML=`<path d="${P[k]}"/>`;

let player=null,hideT;

function showC(){wrap.classList.add("sc");clearTimeout(hideT);hideT=setTimeout(()=>{if(!video.paused)wrap.classList.remove("sc");},3000);}
wrap.addEventListener("mousemove",showC);
wrap.addEventListener("touchstart",showC,{passive:true});

function togglePlay(){video.paused?video.play():video.pause();}
bp.addEventListener("click",togglePlay);
video.addEventListener("click",togglePlay);
video.addEventListener("play",()=>si(ip,"pause"));
video.addEventListener("pause",()=>{si(ip,"play");wrap.classList.add("sc");});

function updateVol(){si(iv,video.muted||video.volume===0?"vOff":"vOn");}
bm.addEventListener("click",()=>{video.muted=!video.muted;updateVol();});
vs.addEventListener("input",()=>{video.volume=parseFloat(vs.value);video.muted=video.volume===0;updateVol();});

bfs.addEventListener("click",()=>{
  if(!document.fullscreenElement)wrap.requestFullscreen();
  else document.exitFullscreen();
});
document.addEventListener("fullscreenchange",()=>si(ifs,document.fullscreenElement?"fsOff":"fsOn"));

qBtn.addEventListener("click",e=>{e.stopPropagation();qMenu.classList.toggle("open");});
document.addEventListener("click",()=>qMenu.classList.remove("open"));

function buildMenu(tracks,activeId){
  qMenu.innerHTML="";
  const auto=document.createElement("div");
  auto.className="qi"+(activeId===-1?" active":"");
  auto.textContent="Auto";
  auto.addEventListener("click",()=>{
    if(player)player.configure({abr:{enabled:true}});
    qBtn.textContent="AUTO";
    buildMenu(player.getVariantTracks(),-1);
  });
  qMenu.appendChild(auto);
  tracks.slice().sort((a,b)=>(b.height||0)-(a.height||0)).forEach(t=>{
    const lbl=t.height?t.height+"p":Math.round((t.bandwidth||0)/1000)+"kbps";
    const d=document.createElement("div");
    d.className="qi"+(t.id===activeId?" active":"");
    d.textContent=lbl;
    d.addEventListener("click",()=>{
      if(player){player.configure({abr:{enabled:false}});player.selectVariantTrack(t,true);}
      qBtn.textContent=lbl;
      buildMenu(player.getVariantTracks(),t.id);
    });
    qMenu.appendChild(d);
  });
}

function showErr(msg){
  loader.classList.add("hide");
  eTxt.innerHTML=msg;
  errEl.classList.add("show");
}

function loadStream(url){
  if(!url)return;
  ub.style.display="none";
  errEl.classList.remove("show");
  loader.classList.remove("hide");
  qMenu.innerHTML="";
  qBtn.textContent="AUTO";

  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()){showErr("Browser not supported.");return;}

  const go=()=>{
    player=new shaka.Player(video);
    player.configure({
      abr:{enabled:true,defaultBandwidthEstimate:2000000,switchInterval:6},
      streaming:{
        bufferingGoal:8,rebufferingGoal:1,bufferBehind:15,
        startAtSegmentBoundary:true,ignoreTextStreamFailures:true,
        retryParameters:{maxAttempts:5,baseDelay:500,backoffFactor:1.5,fuzzFactor:.3,timeout:15000}
      },
      manifest:{
        retryParameters:{maxAttempts:4,baseDelay:500,backoffFactor:1.5,fuzzFactor:.3,timeout:12000},
        dash:{autoCorrectDrift:true,ignoreMinBufferTime:true}
      }
    });

    /* DRM from URL params */
    const qp=k=>{try{return new URL(location.href).searchParams.get(k)||"";}catch(_){return "";}};
    const wv=qp("wv"),ck=qp("ck");
    if(wv)player.configure({drm:{servers:{"com.widevine.alpha":wv}}});
    else if(ck){const p=ck.split(":");if(p[0]&&p[1])player.configure({drm:{clearKeys:{[p[0]]:p[1]}}});}

    let rc=0;
    player.addEventListener("error",e=>{
      const err=e.detail;
      if(err.severity===shaka.util.Error.Severity.CRITICAL){
        rc++;
        if(rc<=4)setTimeout(()=>loadStream(url),rc*2000);
        else showErr("Stream error (code "+err.code+"). Stream may be offline or URL expired.");
      }
    });
    player.addEventListener("trackschanged",()=>{
      const t=player.getVariantTracks();
      if(t.length>0)buildMenu(t,-1);
    });
    player.load(url).then(()=>{
      loader.classList.add("hide");
      video.play().catch(()=>{});
    }).catch(()=>{
      showErr("Failed to load stream.<br><code>"+url+"</code>");
    });
  };

  if(player){player.destroy().then(go);}else{go();}
}

loadBtn.addEventListener("click",()=>loadStream(urlIn.value.trim()));
urlIn.addEventListener("keydown",e=>{if(e.key==="Enter")loadStream(urlIn.value.trim());});
document.addEventListener("contextmenu",e=>e.preventDefault());

/* Auto-load from URL params */
const qp=k=>{try{return new URL(location.href).searchParams.get(k)||"";}catch(_){return "";}};
const raw=qp("get"),fileUrl=raw?atob(raw):qp("file");
if(fileUrl){urlIn.value=fileUrl;loadStream(fileUrl);}
else{loader.classList.add("hide");}

/* Keyboard shortcuts */
document.addEventListener("keydown",e=>{
  const tag=document.activeElement.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA")return;
  switch(e.key){
    case" ":case"k":e.preventDefault();togglePlay();break;
    case"ArrowLeft":e.preventDefault();video.currentTime=Math.max(0,video.currentTime-10);break;
    case"ArrowRight":e.preventDefault();video.currentTime+=10;break;
    case"ArrowUp":e.preventDefault();video.volume=Math.min(1,video.volume+0.1);vs.value=video.volume;updateVol();break;
    case"ArrowDown":e.preventDefault();video.volume=Math.max(0,video.volume-0.1);vs.value=video.volume;updateVol();break;
    case"m":video.muted=!video.muted;updateVol();break;
    case"f":if(!document.fullscreenElement)wrap.requestFullscreen();else document.exitFullscreen();break;
  }
});

})();
</script>
</body>
</html>

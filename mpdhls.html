<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>Video Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
  }

  #player-wrap {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #shaka-container {
    width: 100%;
    height: 100%;
    background: #000;
  }

  #shaka-container video {
    width: 100%;
    height: 100%;
    background: #000;
  }

  /* Error state */
  #error-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: #fff;
    text-align: center;
    padding: 24px;
    background: #000;
    z-index: 20;
  }
  #error-msg.show { display: flex; }
  #error-msg svg  { width: 52px; height: 52px; opacity: 0.4; }
  #error-msg p    { font-size: 16px; opacity: 0.65; max-width: 300px; line-height: 1.5; }

  /* Loading spinner */
  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 10;
    transition: opacity 0.4s;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 44px; height: 44px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="player-wrap">
  <div id="loader"><div class="spinner"></div></div>

  <div id="error-msg">
    <svg viewBox="0 0 24 24" fill="white">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
        10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
    </svg>
    <p id="error-text">No stream URL provided. Please supply a valid <code>?file=</code> or <code>?get=</code> parameter.</p>
  </div>

  <div id="shaka-container" data-shaka-player-container data-shaka-player-cast-receiver-id="">
    <video id="video" data-shaka-player autoplay playsinline></video>
  </div>
</div>

<script>
(function () {
  "use strict";

  function param(name) {
    try { return new URL(window.location.href).searchParams.get(name) || ""; }
    catch (_) { return ""; }
  }

  function safeAtob(str) {
    try { return atob(str); } catch (_) { return str; }
  }

  const get     = param("get");
  const fileUrl = get ? safeAtob(get) : param("file");
  const ckParam = param("ck");
  const wvParam = param("wv");

  const loader   = document.getElementById("loader");
  const errorEl  = document.getElementById("error-msg");
  const errorTxt = document.getElementById("error-text");

  document.addEventListener("contextmenu", e => e.preventDefault());

  if (!fileUrl) {
    loader.classList.add("hidden");
    errorEl.classList.add("show");
    return;
  }

  function onPlayerError(error) {
    console.error("Shaka Error:", error.code, error);
    loader.classList.add("hidden");
    if (error.severity === shaka.util.Error.Severity.CRITICAL) {
      errorTxt.textContent =
        "Stream error (code " + error.code + "). The stream may be offline or unavailable.";
      errorEl.classList.add("show");
    }
  }

  shaka.polyfill.installAll();

  shaka.Player.probeSupport().then(function () {

    const video    = document.getElementById("video");
    const ui       = video["ui"];
    const controls = ui.getControls();
    const player   = controls.getPlayer();

    window.player = player;
    window.ui     = ui;

    /* ── UI ── */
    ui.configure({
      controlPanelElements: [
        "play_pause", "mute", "volume", "spacer",
        "caption", "quality", "language",
        "picture_in_picture", "fullscreen"
      ],
      addSeekBar: true,
      seekBarColors: {
        base:   "rgba(255,255,255,0.3)",
        played: "rgba(255,255,255,0.9)"
      }
    });

    /* ══════════════════════════════════════════
       CORE FIX: ABR + streaming config
       - Let ABR pick quality based on bandwidth
       - Lower rebuffering goal so playback starts fast
       - Smaller buffer behind to free memory
       - Aggressive retry on segment failures
       - Longer manifest update interval for live streams
    ══════════════════════════════════════════ */
    player.configure({
      abr: {
        enabled:               true,   // let Shaka auto-pick quality
        defaultBandwidthEstimate: 500e3, // start from 500 kbps assumption
        switchInterval:        8,      // don't switch quality too often (seconds)
        bandwidthUpgradeTarget:  0.85, // upgrade quality when at 85% bandwidth
        bandwidthDowngradeTarget: 0.95 // drop quality before hitting 95% usage
      },
      streaming: {
        bufferingGoal:          10,    // only buffer 10s ahead (was 30 — too heavy)
        rebufferingGoal:         1,    // resume after just 1s buffered (was 2)
        bufferBehind:           15,    // keep 15s behind (saves memory)
        ignoreTextStreamFailures: true,
        alwaysStreamText:        false,
        startAtSegmentBoundary:  true, // avoid partial segment stalls
        retryParameters: {
          maxAttempts:    5,
          baseDelay:      500,         // retry after 0.5s
          backoffFactor:  1.5,
          fuzzFactor:     0.3,
          timeout:        20000        // 20s timeout per segment
        },
        inaccurateManifestTolerance: 2,
        // For live: how often to re-fetch the playlist
        updateIntervalSeconds: 1       // re-fetch .m3u8 every 1s for live
      },
      manifest: {
        retryParameters: {
          maxAttempts:   5,
          baseDelay:     500,
          backoffFactor: 1.5,
          fuzzFactor:    0.3,
          timeout:       15000
        },
        // HLS specific
        hls: {
          ignoreManifestProgramDateTime: false,
          useFullSegmentsForStartTime:   true
        }
      }
    });

    /* ── DRM ── */
    if (wvParam) {
      player.configure({ drm: { servers: { "com.widevine.alpha": wvParam } } });
    } else if (ckParam) {
      const parts = ckParam.split(":");
      if (parts[0] && parts[1]) {
        player.configure({ drm: { clearKeys: { [parts[0]]: parts[1] } } });
      }
    }

    /* ── Events ── */
    player.addEventListener("error",   e => onPlayerError(e.detail));
    controls.addEventListener("error", e => onPlayerError(e.detail));

    // ✅ REMOVED: the trackschanged force-highest-quality block.
    // That was the main cause of constant buffering — forcing the top
    // bitrate regardless of available bandwidth. ABR handles this now.

    // Optional: log quality switches to console for debugging
    player.addEventListener("adaptation", function () {
      const active = player.getVariantTracks().find(t => t.active);
      if (active) {
        console.info(
          "[ABR] switched →",
          (active.height || "?") + "p",
          "@", Math.round((active.bandwidth || 0) / 1000) + "kbps"
        );
      }
    });

    /* ── Load ── */
    player.load(fileUrl).then(function () {
      loader.classList.add("hidden");
      video.play().catch(err => console.warn("Autoplay blocked:", err));
    }).catch(onPlayerError);

  }).catch(onPlayerError);

  /* ── postMessage: hot-swap stream ── */
  window.addEventListener("message", function (ev) {
    if (ev.data && ev.data.hsUrl && window.player) {
      loader.classList.remove("hidden");
      errorEl.classList.remove("show");
      window.player.load(ev.data.hsUrl).then(function () {
        loader.classList.add("hidden");
        document.getElementById("video").play().catch(() => {});
      }).catch(function (error) {
        loader.classList.add("hidden");
        errorTxt.textContent = "Stream error (code " + error.code + ").";
        errorEl.classList.add("show");
      });
    }
  });

})();
</script>
</body>
</html>

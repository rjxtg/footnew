<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>FootLive Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: sans-serif;
}

#video-container {
  position: relative;
  width: 100%;
  height: 100%;
}

video {
  width: 100%;
  height: 100%;
  object-fit: fill;
  display: block;
  background: #000;
}

/* Controls */
.controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 30px 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
}

#video-container:hover .controls,
#video-container.paused .controls { opacity: 1; }

.ctrl-btn {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.9;
  transition: opacity 0.2s, transform 0.15s;
  flex-shrink: 0;
}

.ctrl-btn:hover { opacity: 1; transform: scale(1.12); }
.ctrl-btn svg { width: 22px; height: 22px; fill: white; }

.time-display {
  color: #fff;
  font-size: 13px;
  white-space: nowrap;
  opacity: 0.85;
  flex-shrink: 0;
}

.volume-slider {
  width: 70px;
  accent-color: #D50000;
  cursor: pointer;
  flex-shrink: 0;
}

.spacer { flex: 1; }

.quality-select {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  outline: none;
  flex-shrink: 0;
}

.quality-select option { background: #1a1a1a; }

.spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 48px;
  height: 48px;
  border: 4px solid rgba(255,255,255,0.15);
  border-top-color: #D50000;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  z-index: 50;
  display: none;
}

.spinner.visible { display: block; }

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.error-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  background: rgba(200,0,0,0.75);
  padding: 18px 28px;
  border-radius: 8px;
  font-size: 15px;
  text-align: center;
  display: none;
  z-index: 200;
  max-width: 80%;
}

.error-msg.visible { display: block; }
</style>
</head>

<body oncontextmenu="return false;">

<div id="video-container">

  <video id="video" playsinline autoplay></video>

  <div class="spinner" id="spinner"></div>
  <div class="error-msg" id="error-msg"></div>

  <div class="controls" id="controls">
    <button class="ctrl-btn" id="play-btn">
      <svg id="play-icon" viewBox="0 0 24 24">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <button class="ctrl-btn" id="mute-btn">
      <svg id="vol-icon" viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3z"/>
      </svg>
    </button>

    <input type="range" class="volume-slider" id="vol-slider"
           min="0" max="1" step="0.05" value="1">

    <span class="time-display" id="time-display">LIVE</span>

    <div class="spacer"></div>

    <select class="quality-select" id="quality-select">
      <option value="-1">Auto</option>
    </select>

    <button class="ctrl-btn" id="fs-btn">
      <svg viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>
    </button>
  </div>
</div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name) || "";
}

function decodeUrl() {
  const get = getParam("get");
  const file = getParam("file");
  if (get) {
    try { return atob(get); } catch(e) { return get; }
  }
  return file;
}

const fileUrl = decodeUrl();
const video = document.getElementById("video");
const container = document.getElementById("video-container");
const spinner = document.getElementById("spinner");
const errorMsg = document.getElementById("error-msg");
const playBtn = document.getElementById("play-btn");
const playIcon = document.getElementById("play-icon");
const muteBtn = document.getElementById("mute-btn");
const volIcon = document.getElementById("vol-icon");
const volSlider = document.getElementById("vol-slider");
const timeDisplay = document.getElementById("time-display");
const qualitySelect = document.getElementById("quality-select");

const PLAY_SVG = `<path d="M8 5v14l11-7z"/>`;
const PAUSE_SVG = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

function setPlayIcon(playing) {
  playIcon.innerHTML = playing ? PAUSE_SVG : PLAY_SVG;
}

function showError(msg) {
  spinner.classList.remove("visible");
  errorMsg.textContent = msg;
  errorMsg.classList.add("visible");
}

if (!fileUrl) {
  document.getElementById("video-container").innerHTML =
    `<h2 style="color:white;text-align:center;margin-top:20%">No stream URL provided</h2>`;
} else {
  initPlayer();
}

async function initPlayer() {
  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    showError("Browser not supported.");
    return;
  }

  spinner.classList.add("visible");

  const player = new shaka.Player(video);

  player.addEventListener("error", (e) => {
    showError("Playback error");
  });

  try {
    await player.load(fileUrl);
    spinner.classList.remove("visible");
    video.play().catch(() => {});
  } catch (err) {
    showError("Failed to load stream");
  }

  playBtn.addEventListener("click", () => {
    video.paused ? video.play() : video.pause();
  });

  video.addEventListener("play", () => {
    setPlayIcon(true);
  });

  video.addEventListener("pause", () => {
    setPlayIcon(false);
  });

  muteBtn.addEventListener("click", () => {
    video.muted = !video.muted;
  });

  volSlider.addEventListener("input", () => {
    video.volume = parseFloat(volSlider.value);
  });

  document.getElementById("fs-btn").addEventListener("click", () => {
    if (!document.fullscreenElement) {
      container.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mobile Optimized Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: sans-serif;
    /* Prevents pull-to-refresh on mobile */
    overscroll-behavior-y: contain; 
  }

  #video-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    width: 100%;
    height: 100%;
    /* 'contain' ensures the whole video is visible on any screen size */
    object-fit: contain; 
    display: block;
  }

  /* Controls overlay optimized for Mobile Touch */
  .controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 20px 15px 20px; /* Extra bottom padding for mobile gestures */
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }

  #video-container:hover .controls,
  #video-container.paused .controls,
  .controls:active { opacity: 1; }

  .ctrl-btn {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 8px; /* Larger touch target */
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ctrl-btn svg { width: 26px; height: 26px; fill: white; }

  /* Fullscreen Button - Bottom Right Positioned */
  #fs-btn {
    margin-left: auto; /* Pushes it to the far right */
  }

  .time-display {
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    white-space: nowrap;
  }

  .volume-slider {
    width: 60px;
    accent-color: #D50000;
  }

  /* Hide volume slider on small mobile screens to save space */
  @media (max-width: 480px) {
    .volume-slider { display: none; }
  }

  .quality-select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  /* Big central play button */
  .big-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    background: rgba(213,0,0,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .big-play.visible { opacity: 1; pointer-events: all; }
  .big-play svg { width: 40px; height: 40px; fill: white; margin-left: 5px; }

  .spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    border: 5px solid rgba(255,255,255,0.1);
    border-top-color: #D50000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }
  .spinner.visible { display: block; }
  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

</style>
</head>
<body oncontextmenu="return false;">

<div id="video-container">
  <video id="video" playsinline autoplay crossorigin="anonymous"></video>

  <div class="spinner" id="spinner"></div>

  <div class="big-play" id="big-play">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>

  <div class="controls" id="controls">
    <button class="ctrl-btn" id="play-btn">
      <svg id="play-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <button class="ctrl-btn" id="mute-btn">
      <svg id="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
    <input type="range" class="volume-slider" id="vol-slider" min="0" max="1" step="0.05" value="1">

    <span class="time-display" id="time-display">LIVE</span>

    <div style="flex-grow: 1; display: flex; justify-content: center;">
        <select class="quality-select" id="quality-select">
            <option value="-1">Auto</option>
        </select>
    </div>

    <button class="ctrl-btn" id="fs-btn">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>
</div>

<script>
// Logic remains identical to your request for compatibility
function getParam(n) { return new URLSearchParams(window.location.search).get(n) || ""; }
function decodeUrl() {
  const g = getParam("get"), f = getParam("file");
  try { return g ? atob(g) : f; } catch(e) { return g || f; }
}

const fileUrl = decodeUrl();
const video = document.getElementById("video");
const container = document.getElementById("video-container");
const bigPlay = document.getElementById("big-play");

async function initPlayer() {
  shaka.polyfill.installAll();
  const player = new shaka.Player(video);
  
  // Global robustness settings
  player.configure({
    streaming: { bufferingGoal: 30, rebufferingGoal: 2, retryParameters: { maxAttempts: 5 } }
  });

  player.addEventListener("buffering", (e) => { 
    document.getElementById("spinner").classList.toggle("visible", e.buffering); 
  });

  try {
    await player.load(fileUrl);
    // Quality Populator
    const tracks = player.getVariantTracks();
    const sel = document.getElementById("quality-select");
    tracks.forEach(t => {
      if(t.height) {
        let opt = document.createElement("option");
        opt.value = t.id; opt.text = t.height + "p";
        sel.appendChild(opt);
      }
    });
  } catch (e) { console.error("Load Error", e); }

  // UI Event Listeners
  const togglePlay = () => video.paused ? video.play() : video.pause();
  document.getElementById("play-btn").onclick = togglePlay;
  bigPlay.onclick = () => video.play();
  video.onclick = togglePlay;

  video.onplay = () => { bigPlay.classList.remove("visible"); container.classList.remove("paused"); };
  video.onpause = () => { bigPlay.classList.add("visible"); container.classList.add("paused"); };

  // Fullscreen Logic for Mobile
  document.getElementById("fs-btn").onclick = () => {
    if (!document.fullscreenElement) {
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen(); // iOS Safari
    } else {
        document.exitFullscreen?.();
    }
  };
}

if(fileUrl) initPlayer();
</script>
</body>
</html>

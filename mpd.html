<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>Mobile DASH Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#player-container{
  position:relative;
  width:100%;
  height:100%;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* Controls */
.controls{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
  padding:18px 12px;
  display:flex;
  align-items:center;
  gap:12px;
  opacity:0;
  transition:.3s;
}

#player-container.show-controls .controls{
  opacity:1;
}

button{
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.time{
  color:#fff;
  font-size:14px;
}

.spacer{flex:1}

select{
  background:rgba(0,0,0,.6);
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
  padding:4px 6px;
  border-radius:4px;
}

/* Loader */
.loader{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:45px;
  height:45px;
  border:4px solid rgba(255,255,255,.2);
  border-top:4px solid red;
  border-radius:50%;
  animation:spin .8s linear infinite;
  display:none;
}

.loader.active{display:block}

@keyframes spin{
  to{transform:translate(-50%,-50%) rotate(360deg)}
}
</style>
</head>

<body>

<div id="player-container">
  <video id="video" playsinline webkit-playsinline autoplay muted></video>
  <div class="loader" id="loader"></div>

  <div class="controls">
    <button id="play">⏯</button>
    <button id="mute">🔊</button>
    <span class="time" id="time">LIVE</span>
    <div class="spacer"></div>
    <select id="quality">
      <option value="-1">Auto</option>
    </select>
    <button id="fs">⛶</button>
  </div>
</div>

<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name) || "";
}

function decodeUrl(){
  const g=getParam("get");
  const f=getParam("file");
  if(g){try{return atob(g)}catch(e){return g}}
  return f;
}

const url=decodeUrl();
const video=document.getElementById("video");
const container=document.getElementById("player-container");
const loader=document.getElementById("loader");
const quality=document.getElementById("quality");

if(!url){
  alert("No stream URL provided");
}else{
  init();
}

async function init(){
  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()){
    alert("Browser not supported");
    return;
  }

  const player=new shaka.Player(video);

  player.configure({
    streaming:{
      bufferingGoal:20,
      rebufferingGoal:2
    },
    abr:{enabled:true}
  });

  player.addEventListener("buffering",e=>{
    loader.classList.toggle("active",e.buffering);
  });

  try{
    await player.load(url);
    populateQuality(player);
    video.play().catch(()=>{});
  }catch(e){
    alert("Stream load failed");
  }

  function populateQuality(p){
    const tracks=p.getVariantTracks();
    tracks.sort((a,b)=>b.height-a.height);
    const seen=new Set();
    tracks.forEach(t=>{
      if(t.height && !seen.has(t.height)){
        seen.add(t.height);
        const opt=document.createElement("option");
        opt.value=t.id;
        opt.textContent=t.height+"p";
        quality.appendChild(opt);
      }
    });
  }

  quality.addEventListener("change",()=>{
    const val=parseInt(quality.value);
    if(val===-1){
      player.configure({abr:{enabled:true}});
    }else{
      player.configure({abr:{enabled:false}});
      const track=player.getVariantTracks().find(t=>t.id===val);
      if(track) player.selectVariantTrack(track,true);
    }
  });

  document.getElementById("play").onclick=()=>{
    video.paused?video.play():video.pause();
  };

  document.getElementById("mute").onclick=()=>{
    video.muted=!video.muted;
  };

  document.getElementById("fs").onclick=()=>{
    if(!document.fullscreenElement){
      container.requestFullscreen?.();
    }else{
      document.exitFullscreen?.();
    }
  };

  video.addEventListener("click",()=>{
    container.classList.add("show-controls");
    setTimeout(()=>container.classList.remove("show-controls"),3000);
  });
}
</script>

</body>
</html>

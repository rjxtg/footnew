<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>
body {
  margin:0;
  background:#0f0f0f;
  font-family:Arial, sans-serif;
}

.player-container {
  position:relative;
  width:100%;
  height:100vh;
  background:black;
  overflow:hidden;
}

video {
  width:100%;
  height:100%;
  object-fit:contain;
  background:black;
}

/* Center Play Button */
.big-play {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.3s;
}

.big-play:hover {
  background:rgba(255,255,255,0.25);
}

.big-play svg {
  width:35px;
  fill:white;
}

/* Bottom Controls */
.controls {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:30px;
  backdrop-filter:blur(10px);
}

.control-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  transition:0.3s;
}

.control-btn:hover {
  background:rgba(255,255,255,0.2);
}

.control-btn svg {
  width:20px;
  fill:white;
}

/* Telegram Button */
.telegram-btn {
  position:absolute;
  top:15px;
  left:15px;
  background:#0088cc;
  color:white;
  padding:8px 14px;
  border-radius:25px;
  display:flex;
  align-items:center;
  gap:6px;
  text-decoration:none;
  font-size:14px;
  font-weight:bold;
}

.telegram-btn svg {
  width:18px;
  fill:white;
}
</style>
</head>

<body>

<div class="player-container">

  <!-- Telegram Button -->
  <a href="https://t.me/YOURCHANNEL" target="_blank" class="telegram-btn">
    <svg viewBox="0 0 24 24">
      <path d="M9.04 16.5l-.38 5.36c.54 0 .77-.23 1.05-.5l2.52-2.41 5.22 3.82c.96.53 1.64.25 1.9-.89l3.45-16.16h.01c.31-1.45-.52-2.02-1.45-1.68L1.2 9.68c-1.4.55-1.38 1.34-.24 1.69l5.7 1.78L19.94 5.5c.62-.4 1.18-.18.72.22"/>
    </svg>
    Join Telegram
  </a>

  <video id="video" playsinline webkit-playsinline></video>

  <!-- Big Play -->
  <div class="big-play" id="bigPlay">
    <svg viewBox="0 0 24 24">
      <polygon points="8,5 19,12 8,19"/>
    </svg>
  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <div class="control-btn" id="muteBtn">
      <svg id="muteIcon" viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3z"/>
      </svg>
    </div>
  </div>

</div>

<script>
const video = document.getElementById('video');
const bigPlay = document.getElementById('bigPlay');
const muteBtn = document.getElementById('muteBtn');

async function init() {
  const player = new shaka.Player(video);

  try {
    await player.load("YOUR_MPD_LINK_HERE");
    console.log("Video loaded");
  } catch (e) {
    console.error(e);
  }
}

bigPlay.addEventListener('click', () => {
  video.play();
  bigPlay.style.display = "none";
});

muteBtn.addEventListener('click', () => {
  video.muted = !video.muted;
});

video.addEventListener('pause', () => {
  bigPlay.style.display = "flex";
});

video.addEventListener('play', () => {
  bigPlay.style.display = "none";
});

init();
</script>

</body>
</html>
